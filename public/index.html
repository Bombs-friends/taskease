<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>TaskEase</title>
    <link rel="stylesheet" href="/style.css?v=1.0.2">
</head>
<body>

<header class="nav">
    <div class="nav-inner">
        <div class="logo-area">
            <h1 id="app-title">TaskEase</h1>
            <div class="small-stats" id="stats">0 pending</div>
        </div>

        <div class="search-area">
            <input type="search" class="search-bar" placeholder="Search tasks..." aria-label="Search tasks" />
        </div>

        <div class="controls-area" id="auth-controls" aria-live="polite">
            <button id="login-btn" class="text-btn">Log in</button>
            <button id="signup-btn" class="primary-btn">Sign up</button>
            <button id="logout-btn" class="text-btn" style="display:none">Log out</button>
            <span id="user-label" class="user-label" aria-hidden="false"></span>
        </div>
    </div>
</header>

<main>
    <div class="kanban">
        <div class="column pending">
            <h2 class="section-title">Tasks to complete</h2>
            <p class="section-sub">Your active tasks and priorities</p>
            <div class="task-list" id="pending-list"></div>
        </div>
        <div class="column done">
            <h2 class="section-title">Completed tasks</h2>
            <p class="section-sub">Tasks you've finished</p>
            <div class="task-list" id="done-list"></div>
        </div>
    </div>
</main>

<div class="add-task-modal" id="add-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="add-title">
    <div class="modal-content">
        <h3 id="add-title">Γ₧ò Add New Task</h3>
        <form id="task-form">
            <input type="text" name="title" placeholder="≡ƒô¥ Task title" required>
            <input type="text" name="description" placeholder="≡ƒôû Description (optional)">
            <input type="date" name="date" placeholder="≡ƒôà Due date (optional)">
            <input type="time" name="time" placeholder="≡ƒòÉ Deadline time (optional)">
            <div class="modal-buttons">
                <button type="button" onclick="closeModal()">Cancel</button>
                <button type="submit">Add Task</button>
            </div>
        </form>
    </div>
</div>

<button class="fab" onclick="openModal()" aria-label="Add task">+</button>

<!-- Login Modal -->
<div class="add-task-modal" id="login-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="login-title">
    <div class="modal-content">
        <h3 id="login-title">Log In</h3>
        <form id="login-form">
            <label for="login-username">Username</label>
            <input id="login-username" name="username" required />
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" required />
            <div class="modal-buttons">
                <button type="button" onclick="closeLoginModal()">Cancel</button>
                <button type="submit">Log In</button>
            </div>
        </form>
    </div>
</div>

<!-- Signup Modal -->
<div class="add-task-modal" id="signup-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="signup-title">
    <div class="modal-content">
        <h3 id="signup-title">Sign Up</h3>
        <form id="signup-form">
            <label for="signup-username">Username</label>
            <input id="signup-username" name="username" required />
            <label for="signup-password">Password</label>
            <input id="signup-password" name="password" type="password" required />
            <div class="modal-buttons">
                <button type="button" onclick="closeSignupModal()">Cancel</button>
                <button type="submit">Create Account</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Modal -->
<div class="add-task-modal" id="edit-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="edit-title">
    <div class="modal-content">
        <h3 id="edit-title">Edit Task</h3>
        <form id="edit-form">
            <input type="hidden" id="edit-id" name="id" />
            <label for="edit-title-input" class="sr-only">Title</label>
            <input id="edit-title-input" name="title" placeholder="Task title" required />
            <label for="edit-desc-input" class="sr-only">Description</label>
            <input id="edit-desc-input" name="description" placeholder="Description (optional)" />
            <label for="edit-date-input" class="sr-only">Due date</label>
            <input id="edit-date-input" name="date" type="date" />
            <label for="edit-time-input" class="sr-only">Due time</label>
            <input id="edit-time-input" name="time" type="time" />
            <div class="modal-buttons">
                <button type="button" onclick="closeEditModal()">Cancel</button>
                <button type="submit">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="script.js?v=1.0.2"></script>
</body>
</html>
