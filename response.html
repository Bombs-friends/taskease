<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>TaskEase</title>
    <link rel="stylesheet" href="/style.css?v=1.0.2">
</head>
<body>

<header>
    <h1>TaskEase</h1>
    <div class="header-controls">
        <input type="text" class="search-bar" placeholder="🔍 Search tasks...">
        <div class="stats">You have 0 tasks pending</div>
    </div>
</header>

<main>
    <div class="kanban">
        <div class="column pending">
            <h2>⏳ Pending</h2>
            <div class="task-list" id="pending-list"></div>
        </div>
        <div class="column done">
            <h2>✅ Done</h2>
            <div class="task-list" id="done-list"></div>
        </div>
    </div>
</main>

<div class="add-task-modal" id="add-modal">
    <div class="modal-content">
        <h3>➕ Add New Task</h3>
        <form id="task-form">
            <input type="text" name="title" placeholder="📝 Task title" required>
            <input type="text" name="description" placeholder="📖 Description (optional)">
            <input type="date" name="date" placeholder="📅 Due date (optional)">
            <input type="time" name="time" placeholder="🕐 Deadline time (optional)">
            <div class="modal-buttons">
                <button type="button" onclick="closeModal()">Cancel</button>
                <button type="submit">Add Task</button>
            </div>
        </form>
    </div>
</div>

<button class="fab" onclick="openModal()">➕</button>

<script src="script.js?v=1.0.2"></script>
</body>
</html>
